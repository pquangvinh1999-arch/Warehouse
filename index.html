<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHM PRO - Vinh Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f7fe; }
        .sidebar-active { background: #4f46e5; color: white; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4); }
        .input-focus:focus { border-color: #4f46e5; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); outline: none; }
        .table-container { height: calc(100vh - 200px); overflow: auto; }
        thead th { position: sticky; top: 0; background: #f8fafc; z-index: 10; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col">
        <div class="p-6 border-b border-slate-100">
            <h1 class="text-xl font-extrabold text-indigo-600">WHM PRO <span class="text-[10px] text-slate-400 block">BY VINH</span></h1>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <div onclick="switchPage('nhap')" id="m-nhap" class="flex items-center gap-3 p-3 rounded-xl cursor-pointer font-bold sidebar-active">Nhập kho (Ánh xạ)</div>
            <div onclick="switchPage('tonkho')" id="m-tonkho" class="flex items-center gap-3 p-3 rounded-xl cursor-pointer font-bold text-slate-500 hover:bg-slate-50">Tồn Kho Thành Phẩm</div>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col">
        <header class="h-16 bg-white border-b flex items-center justify-between px-8">
            <h2 id="pageTitle" class="text-lg font-bold text-slate-800">Nhập Kho (3 Bước)</h2>
            <div id="clock" class="text-sm font-bold text-slate-500"></div>
        </header>

        <main class="flex-1 p-6 overflow-hidden">
            
            <div id="view-nhap" class="max-w-xl mx-auto space-y-4">
                <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 space-y-4">
                    <div class="flex justify-between items-center">
                        <span class="font-bold text-slate-700">Tiến trình: <span id="stepLabel" class="text-indigo-600">Bước 1: Quét Bin</span></span>
                        <button onclick="resetProcess()" class="text-xs font-bold text-red-500">Làm mới</button>
                    </div>
                    
                    <div class="space-y-3">
                        <input type="text" id="inpBin" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-center text-xl font-bold input-focus" placeholder="1. Quét Vị Trí (Bin)">
                        <input type="text" id="inpTag" disabled class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-center text-xl font-bold opacity-30" placeholder="2. Quét Tag ID">
                        <input type="number" id="inpQty" disabled class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-center text-xl font-bold opacity-30" placeholder="3. Nhập Số Lượng (QTY)">
                    </div>

                    <div class="pt-4 border-t flex justify-between items-center">
                        <div>
                            <p class="text-[10px] font-bold text-slate-400 uppercase">Đang chờ đẩy lên</p>
                            <p class="text-2xl font-black text-indigo-600"><span id="qCount">0</span> Tags</p>
                        </div>
                        <button onclick="syncData()" id="btnSync" class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg hover:bg-indigo-700">ĐỒNG BỘ CLOUD</button>
                    </div>
                </div>
                <div id="queueList" class="grid grid-cols-2 gap-2"></div>
            </div>

            <div id="view-tonkho" class="hidden h-full flex flex-col space-y-4">
                <div class="flex justify-between items-center">
                    <input type="text" id="search" onkeyup="filterTable()" placeholder="Tìm Tag, Mã hàng, Bin..." class="p-3 border rounded-xl w-80 shadow-sm outline-none focus:ring-2 ring-indigo-500">
                    <button onclick="fetchSheetData()" class="bg-slate-800 text-white px-4 py-2 rounded-lg text-sm font-bold">Làm mới dữ liệu</button>
                </div>
                <div class="bg-white rounded-2xl border shadow-sm flex-1 overflow-hidden">
                    <div class="table-container">
                        <table class="w-full text-left text-[11px]">
                            <thead class="bg-slate-50 uppercase font-bold text-slate-600">
                                <tr>
                                    <th class="p-3">LP NO</th><th class="p-3">Mã Hàng</th><th class="p-3">QTY Thực</th>
                                    <th class="p-3">QTY Iscala</th><th class="p-3">Vị trí WH</th><th class="p-3">Ngày Nhập</th>
                                    <th class="p-3">Ngày Tạo</th><th class="p-3 text-indigo-600">Tag ID</th><th class="p-3 text-indigo-600">Bin</th>
                                    <th class="p-3 text-center">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody id="inventoryBody" class="divide-y divide-slate-100"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbw4uvsCKwvSGfOEQR2Pyt7VjnDeMD5LKez33L-7NFiLMmH2navpvB8JB7tAES59r_yg0A/exec'; // THAY LINK CỦA ANH VÀO ĐÂY
        let scanQueue = [];
        let sheetData = [];

        // XỬ LÝ NHẬP KHO 3 BƯỚC
        const inpBin = document.getElementById('inpBin');
        const inpTag = document.getElementById('inpTag');
        const inpQty = document.getElementById('inpQty');

        inpBin.onkeypress = (e) => { if(e.key==='Enter' && inpBin.value) { 
            inpBin.disabled = true; inpTag.disabled = false; inpTag.classList.remove('opacity-30'); inpTag.focus(); 
            document.getElementById('stepLabel').innerText = "Bước 2: Quét Tag ID";
        }};

        inpTag.onkeypress = (e) => { if(e.key==='Enter' && inpTag.value) { 
            inpTag.disabled = true; inpQty.disabled = false; inpQty.classList.remove('opacity-30'); inpQty.focus(); 
            document.getElementById('stepLabel').innerText = "Bước 3: Nhập Số Lượng";
        }};

        inpQty.onkeypress = (e) => { if(e.key==='Enter' && inpQty.value) {
            const now = new Date();
            const dateStr = `${now.getDate()}/${now.getMonth()+1}/${now.getFullYear()}`;
            scanQueue.push({
                bin: inpBin.value,
                tag: inpTag.value,
                qty: inpQty.value,
                date: dateStr,
                id: Date.now()
            });
            renderQueue();
            resetStep();
        }};

        function resetStep() {
            inpTag.value = ''; inpQty.value = '';
            inpTag.disabled = false; inpQty.disabled = true; inpQty.classList.add('opacity-30');
            inpTag.focus();
            document.getElementById('stepLabel').innerText = "Bước 2: Quét Tag ID";
        }

        function resetProcess() {
            location.reload();
        }

        function renderQueue() {
            document.getElementById('qCount').innerText = scanQueue.length;
            document.getElementById('queueList').innerHTML = scanQueue.map(item => `
                <div onclick="removeFromQueue(${item.id})" class="bg-indigo-50 p-3 rounded-xl border border-indigo-200 cursor-pointer hover:bg-red-50 hover:border-red-200 transition-all group">
                    <p class="text-[10px] font-bold text-indigo-400 group-hover:text-red-400">TAG: ${item.tag}</p>
                    <p class="text-sm font-bold text-slate-700">SL: ${item.qty} | Bin: ${item.bin}</p>
                </div>
            `).join('');
        }

        function removeFromQueue(id) {
            scanQueue = scanQueue.filter(i => i.id !== id);
            renderQueue();
        }

        async function syncData() {
            if(!scanQueue.length) return alert("Chưa có dữ liệu!");
            const btn = document.getElementById('btnSync');
            btn.innerText = "ĐANG ĐẨY..."; btn.disabled = true;
            
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: 'INBOUND_V2', data: scanQueue })
                });
                alert("Đã đồng bộ thành công!");
                scanQueue = []; renderQueue();
            } catch(e) { alert("Lỗi kết nối!"); }
            btn.innerText = "ĐỒNG BỘ CLOUD"; btn.disabled = false;
        }

        // QUẢN LÝ TỒN KHO
        async function fetchSheetData() {
            const body = document.getElementById('inventoryBody');
            body.innerHTML = '<tr><td colspan="10" class="p-10 text-center font-bold text-slate-400">Đang lấy dữ liệu gốc...</td></tr>';
            
            try {
                const res = await fetch(`https://docs.google.com/spreadsheets/d/187ELbEKpx_ZOlIowIj9M0Rqt7V3R2SMdcrtGUylNAnA/export?format=csv&gid=606205569`);
                const text = await res.text();
                const rows = text.split('\n').slice(1);
                sheetData = rows.map((row, idx) => ({ vals: row.split(','), rowIdx: idx + 2 }));
                renderTable(sheetData);
            } catch(e) { body.innerHTML = 'Lỗi tải dữ liệu!'; }
        }

        function renderTable(data) {
            document.getElementById('inventoryBody').innerHTML = data.map(item => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="p-3">${item.vals[0] || ''}</td>
                    <td class="p-3 font-bold">${item.vals[1] || ''}</td>
                    <td class="p-3 font-bold text-blue-600">${item.vals[2] || '0'}</td>
                    <td class="p-3">${item.vals[3] || ''}</td>
                    <td class="p-3">${item.vals[4] || ''}</td>
                    <td class="p-3 text-slate-400">${item.vals[5] || ''}</td>
                    <td class="p-3 text-slate-400">${item.vals[6] || ''}</td>
                    <td class="p-3 font-bold text-indigo-600">${item.vals[7] || ''}</td>
                    <td class="p-3 font-bold text-indigo-600">${item.vals[8] || ''}</td>
                    <td class="p-3 text-center">
                        <button onclick="editRow(${item.rowIdx}, ${item.vals[2]})" class="text-indigo-600 font-bold hover:underline">Sửa</button>
                        <button onclick="deleteRow(${item.rowIdx})" class="text-red-500 font-bold hover:underline ml-3">Xóa</button>
                    </td>
                </tr>
            `).join('');
        }

        function editRow(row, oldQty) {
            const nQty = prompt("Nhập số lượng thực tế mới:", oldQty);
            if(nQty) sendUpdate({ action: 'EDIT', row, qty: nQty });
        }

        function deleteRow(row) {
            if(confirm("Xóa dòng này dữ liệu trên Sheet sẽ mất. Anh chắc chứ?")) 
                sendUpdate({ action: 'DELETE', row });
        }

        async function sendUpdate(payload) {
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("Gửi yêu cầu thành công! Đang tải lại...");
            fetchSheetData();
        }

        function switchPage(p) {
            document.getElementById('view-nhap').classList.toggle('hidden', p!=='nhap');
            document.getElementById('view-tonkho').classList.toggle('hidden', p!=='tonkho');
            document.getElementById('m-nhap').className = p==='nhap' ? 'flex items-center gap-3 p-3 rounded-xl cursor-pointer font-bold sidebar-active' : 'flex items-center gap-3 p-3 rounded-xl cursor-pointer font-bold text-slate-500 hover:bg-slate-50';
            document.getElementById('m-tonkho').className = p==='tonkho' ? 'flex items-center gap-3 p-3 rounded-xl cursor-pointer font-bold sidebar-active' : 'flex items-center gap-3 p-3 rounded-xl cursor-pointer font-bold text-slate-500 hover:bg-slate-50';
            if(p==='tonkho') fetchSheetData();
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleString('vi-VN'); }, 1000);
        window.onload = () => { inpBin.focus(); };
    </script>
</body>
</html>
