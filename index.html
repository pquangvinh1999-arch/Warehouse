<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHM PRO - VINH ENTERPRISE</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .input-focus:focus { border-color: #4f46e5; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        .list-enter-active, .list-leave-active { transition: all 0.3s ease; }
        .list-enter-from, .list-leave-to { opacity: 0; transform: translateX(30px); }
    </style>
</head>
<body>

<div id="app" class="max-w-lg mx-auto min-h-screen flex flex-col p-4">
    <div class="bg-indigo-600 rounded-2xl p-6 text-white shadow-lg mb-4 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-extrabold tracking-tight text-white">WHM PRO - ÁNH XẠ</h1>
            <p class="text-[10px] opacity-80 uppercase font-semibold">Vinh Enterprise | {{ currentTime }}</p>
        </div>
        <div class="text-right">
            <p class="text-3xl font-black">{{ queue.length }}</p>
            <p class="text-[10px] uppercase">Tags chờ đẩy</p>
        </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 space-y-4 mb-4">
        <div>
            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Bước 1: Vị trí ánh xạ (Bin)</label>
            <input v-model="form.loc" ref="locInput" @keyup.enter="$refs.tagInput.focus()"
                   class="w-full mt-1 p-4 bg-slate-50 border-2 border-slate-100 rounded-xl text-center text-2xl font-bold text-indigo-600 outline-none transition-all input-focus"
                   placeholder="Quét Vị Trí...">
        </div>

        <div>
            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Bước 2: Quét Tag ID liên tục</label>
            <input v-model="form.tag" ref="tagInput" @keyup.enter="quickAdd"
                   class="w-full mt-1 p-4 bg-indigo-50 border-2 border-indigo-100 rounded-xl text-center text-xl font-bold text-slate-700 outline-none transition-all input-focus"
                   placeholder="Quét Tag ID tại đây...">
        </div>

        <div class="grid grid-cols-2 gap-3 pt-2">
            <button @click="exportExcel" class="bg-emerald-600 text-white py-3 rounded-xl font-bold shadow-md hover:bg-emerald-700 active:scale-95 transition-all flex items-center justify-center gap-2">
                📥 Excel
            </button>
            <button @click="syncCloud" :disabled="isSyncing || queue.length === 0" 
                    class="bg-indigo-600 text-white py-3 rounded-xl font-bold shadow-md hover:bg-indigo-700 active:scale-95 transition-all disabled:opacity-50">
                {{ isSyncing ? '... Đang đẩy' : '☁️ Đồng bộ Cloud' }}
            </button>
        </div>
    </div>

    <div class="flex-1 overflow-hidden flex flex-col">
        <div class="flex justify-between items-center mb-2 px-2">
            <h3 class="text-sm font-bold text-slate-600 uppercase">Danh sách quét tạm</h3>
            <button @click="clearAll" class="text-[10px] font-bold text-red-500 uppercase">Xóa sạch</button>
        </div>
        
        <div class="overflow-y-auto flex-1 space-y-2 pr-1">
            <transition-group name="list">
                <div v-for="(item, index) in queueReversed" :key="item.id" 
                     class="bg-white p-3 rounded-xl border border-slate-200 shadow-sm flex justify-between items-center group">
                    <div>
                        <div class="flex items-center gap-2">
                            <span class="text-indigo-600 font-bold text-xs">📍 {{ item.loc }}</span>
                            <span class="text-[9px] text-slate-400">{{ item.time }}</span>
                        </div>
                        <p class="text-sm font-bold text-slate-700">🏷️ Tag: {{ item.tag }}</p>
                    </div>
                    <div class="flex gap-1">
                        <button @click="editItem(item.id)" class="p-2 text-blue-500 hover:bg-blue-50 rounded-lg">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
                        </button>
                        <button @click="deleteItem(item.id)" class="p-2 text-red-400 hover:bg-red-50 rounded-lg">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    </div>
                </div>
            </transition-group>
            
            <div v-if="queue.length === 0" class="text-center py-10 text-slate-400 italic text-sm">
                Đang đợi quét mã đầu tiên...
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp, ref, onMounted, computed } = Vue;

    createApp({
        setup() {
            const queue = ref(JSON.parse(localStorage.getItem('Vinh_Mapping_Data')) || []);
            const form = ref({ loc: '', tag: '' });
            const isSyncing = ref(false);
            const currentTime = ref('');
            const locInput = ref(null);
            const tagInput = ref(null);

            // Link Google Apps Script
            const CLOUD_API = 'https://script.google.com/macros/s/AKfycbx_yiyQX_5sZzzjuYCewBJbolSwfD_wZK5qDetlbvN1bTrqoVNGU7Pm2SS-ZOl4lN0T9g/exec';

            const queueReversed = computed(() => [...queue.value].reverse());

            const updateTime = () => {
                currentTime.value = new Date().toLocaleTimeString('vi-VN');
            };

            // Hàm quét nhanh Tag ID
            const quickAdd = () => {
                const locVal = form.value.loc.trim();
                const tagVal = form.value.tag.trim();

                if (!locVal) {
                    alert("⚠️ Anh cần quét Vị trí trước!");
                    locInput.value.focus();
                    return;
                }
                if (!tagVal) return;

                // Thêm vào hàng chờ
                queue.value.push({
                    id: Date.now(),
                    loc: locVal,
                    tag: tagVal,
                    time: new Date().toLocaleString('vi-VN')
                });

                form.value.tag = ''; // Xóa ô Tag để quét tiếp mã khác
                saveLocal();
                tagInput.value.focus(); // Giữ con trỏ ở ô Tag
            };

            const syncCloud = async () => {
                if (queue.value.length === 0) return;
                isSyncing.value = true;
                try {
                    const payload = { data: queue.value };
                    await fetch(CLOUD_API, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    alert("🚀 Đồng bộ thành công!");
                    queue.value = [];
                    saveLocal();
                } catch (e) {
                    alert("❌ Lỗi mạng, anh kiểm tra lại nhé!");
                } finally {
                    isSyncing.value = false;
                }
            };

            const saveLocal = () => localStorage.setItem('Vinh_Mapping_Data', JSON.stringify(queue.value));
            const deleteItem = (id) => { queue.value = queue.value.filter(i => i.id !== id); saveLocal(); };
            const editItem = (id) => {
                const item = queue.value.find(i => i.id === id);
                const newVal = prompt("Sửa Tag ID:", item.tag);
                if (newVal) { item.tag = newVal.trim(); saveLocal(); }
            };
            const clearAll = () => { if(confirm('Xóa sạch danh sách?')) { queue.value = []; saveLocal(); }};
            const exportExcel = () => {
                const ws = XLSX.utils.json_to_sheet(queue.value);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Mapping");
                XLSX.writeFile(wb, `Mapping_${Date.now()}.xlsx`);
            };

            onMounted(() => {
                updateTime();
                setInterval(updateTime, 1000);
                locInput.value.focus();
            });

            return { queue, form, queueReversed, isSyncing, currentTime, locInput, tagInput, quickAdd, syncCloud, deleteItem, editItem, clearAll, exportExcel };
        }
    }).mount('#app');
</script>
</body>
</html>
