<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHM Enterprise - Vinh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; overflow: hidden; }
        .sidebar-item { transition: all 0.2s ease; cursor: pointer; }
        .sidebar-item:hover { background-color: #f1f5f9; color: #4f46e5; }
        .sidebar-item.active { background-color: #4f46e5; color: white; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3); }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid #e2e8f0; }
        .step-active { border-color: #4f46e5; background-color: #eef2ff; color: #4f46e5; }
        .step-done { border-color: #10b981; background-color: #f0fdf4; color: #065f46; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <aside class="w-72 bg-white border-r border-slate-200 flex flex-col h-full shadow-sm z-30">
        <div class="p-6 border-b border-slate-100 bg-white">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 17v-10l8 4" /></svg>
                </div>
                <div><h1 class="text-lg font-extrabold text-slate-900 leading-tight">WHM <span class="text-indigo-600">PRO</span></h1><p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">By Vinh</p></div>
            </div>
        </div>
        <nav class="flex-1 overflow-y-auto p-4 space-y-6 custom-scrollbar">
            <div>
                <p class="text-[10px] font-bold text-slate-400 uppercase px-3 mb-2 tracking-widest">Vận hành</p>
                <div class="space-y-1">
                    <div onclick="switchPage('nhap')" id="menu-nhap" class="sidebar-item active flex items-center gap-3 p-3 rounded-xl text-sm font-semibold"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 003 3h6a3 3 0 003-3V7a3 3 0 00-3-3h-6a3 3 0 00-3 3v1" /></svg>Nhập kho</div>
                    <div onclick="switchPage('xuat')" id="menu-xuat" class="sidebar-item flex items-center gap-3 p-3 rounded-xl text-sm font-medium text-slate-600"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>Xuất kho</div>
                </div>
            </div>
            <div>
                <p class="text-[10px] font-bold text-slate-400 uppercase px-3 mt-6 mb-2 tracking-widest">Báo cáo</p>
                <div onclick="switchPage('dashboard')" id="menu-dashboard" class="sidebar-item flex items-center gap-3 p-3 rounded-xl text-sm font-medium text-slate-600"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>Dashboard Tổng thể</div>
            </div>
        </nav>
        <div class="p-4 border-t border-slate-100">
            <div class="flex items-center gap-3 p-3 rounded-2xl bg-slate-50 border border-slate-100">
                <div class="w-8 h-8 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600 font-bold text-xs">AV</div>
                <div class="flex-1 overflow-hidden"><p class="text-xs font-bold text-slate-900 truncate">Admin Vinh</p><p class="text-[10px] text-slate-400">Super User</p></div>
            </div>
        </div>
    </aside>

    <div class="flex-1 flex flex-col h-full relative overflow-hidden">
        <header class="h-16 bg-white border-b border-slate-200 px-8 flex justify-between items-center">
            <h2 id="pageTitle" class="text-lg font-bold text-slate-800">Nhập Kho Thông Minh</h2>
            <div class="flex items-center gap-6"><span class="text-xs font-medium text-slate-500">Cloud Sync Active</span><span id="currentDate" class="text-xs font-bold text-slate-700"></span></div>
        </header>

        <div id="mainContent" class="flex-1 p-8 overflow-y-auto custom-scrollbar">
            <!-- VIEW NHẬP KHO -->
            <div id="view-nhap" class="max-w-2xl mx-auto space-y-6">
                <div class="bg-white p-8 rounded-3xl border border-slate-200 shadow-xl text-center space-y-6">
                    <h3 class="text-2xl font-bold text-slate-800">Nhập Kho Nhanh</h3>
                    <div class="flex flex-col items-center gap-4">
                        <div id="stepIndicator" class="flex gap-2 mb-4">
                            <div class="w-8 h-2 rounded-full bg-indigo-600"></div><div class="w-8 h-2 rounded-full bg-slate-200"></div><div class="w-8 h-2 rounded-full bg-slate-200"></div><div class="w-8 h-2 rounded-full bg-slate-200"></div>
                        </div>
                        <input type="text" id="scanInput" class="w-full p-5 border-2 border-indigo-100 rounded-2xl text-center text-2xl focus:ring-4 focus:ring-indigo-100 outline-none transition-all" placeholder="Quét tại đây..." autofocus>
                        <p id="scanLabel" class="text-sm text-slate-500">Vui lòng quét Vị trí kệ/bin</p>
                    </div>
                    <button id="btnSync" class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-200 transition-all">Đồng bộ Cloud</button>
                </div>
            </div>

            <!-- VIEW XUẤT KHO -->
            <div id="view-xuat" class="hidden max-w-2xl mx-auto space-y-6">
                <div class="bg-white p-8 rounded-3xl border border-slate-200 shadow-xl text-center space-y-6">
                    <h3 class="text-2xl font-bold text-slate-800">Xuất Kho Nhanh</h3>
                    <div class="flex flex-col items-center gap-4">
                        <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.//8 4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 17v-10l8 4" /></svg>
                        </div>
                        <input type="text" id="exportInput" class="w-full p-5 border-2 border-red-100 rounded-2xl text-center text-2xl focus:ring-4 focus:ring-red-100 outline-none transition-all" placeholder="Quét Tag ID để xuất...">
                        <p id="exportLabel" class="text-sm text-slate-500">Quét mã Tag để trừ tồn kho</p>
                    </div>
                </div>
            </div>

            <!-- VIEW DASHBOARD -->
            <div id="view-dashboard" class="hidden space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="glass-card p-6 rounded-3xl shadow-sm"><p class="text-xs font-bold text-slate-400 uppercase mb-1">Tổng tồn kho</p><h3 class="text-3xl font-bold text-slate-900" id="dash-total">0 pcs</h3></div>
                    <div class="glass-card p-6 rounded-3xl shadow-sm"><p class="text-xs font-bold text-slate-400 uppercase mb-1">Đơn chờ xuất</p><h3 class="text-3xl font-bold text-indigo-600" id="dash-pending">0 đơn</h3></div>
                    <div class="glass-card p-6 rounded-3xl shadow-sm"><p class="text-xs font-bold text-slate-400 uppercase mb-1">Cảnh báo tồn thấp</p><h3 class="text-3xl font-bold text-red-500" id="dash-alert">0 mã</h3></div>
                </div>
                <div class="glass-card p-6 rounded-3xl shadow-sm h-96"><canvas id="mainChart"></canvas></div>
            </div>
        </div>

        <!-- AI COMMAND CENTER -->
        <div class="fixed bottom-8 left-1/2 -translate-x-1/2 w-full max-w-2xl px-4 z-50">
            <div class="ai-chat-bar glass-card p-2 rounded-full shadow-2xl flex items-center gap-3 border-indigo-300 ring-4 ring-indigo-50">
                <div class="w-10 h-10 ai-gradient rounded-full flex items-center justify-center text-white shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" /></svg>
                </div>
                <input type="text" id="aiCmd" class="flex-1 bg-transparent border-none outline-none text-sm font-medium text-slate-700 placeholder-slate-400" placeholder="Hỏi AI (VD: 'Tìm mã 5152', 'Mở nhập kho')...">
                <button onclick="askAI()" class="bg-indigo-600 text-white p-2 rounded-full hover:bg-indigo-700 transition-all active:scale-90 shadow-md">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>
                </button>
            </div>
        </div>
    </main>

    <script>
        const CLOUD_URL = 'https://script.google.com/macros/s/XXXX_LINK_CỦA_ANH_XXXX/exec';
        
        let currentStep = 'LOC';
        let currentLoc = localStorage.getItem('pda_loc_pro') || '';
        let tempRow = { tag: '', item: '', qty: '' };
        let scannedData = [];

        function switchPage(pageId) {
            ['view-dashboard', 'view-nhap', 'view-xuat'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            
            if (pageId === 'dashboard') {
                document.getElementById('view-dashboard').classList.remove('hidden');
                document.getElementById('menu-dashboard').classList.add('active');
                document.getElementById('pageTitle').innerText = 'Dashboard Tổng Thể';
                loadDashboardData();
            } else if (pageId === 'nhap') {
                document.getElementById('view-nhap').classList.remove('hidden');
                document.getElementById('menu-nhap').classList.add('active');
                document.getElementById('pageTitle').innerText = 'Nhập Kho Thông Minh';
            } else if (pageId === 'xuat') {
                document.getElementById('view-xuat').classList.remove('hidden');
                document.getElementById('menu-xuat').classList.add('active');
                document.getElementById('pageTitle').innerText = 'Xuất Kho Thông Minh';
            }
        }

        // LOGIC NHẬP KHO
        document.getElementById('scanInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const val = this.value.trim();
                if (!val) return;
                if (currentStep === 'LOC' || !currentLoc) {
                    currentLoc = val; currentStep = 'TAG';
                    document.getElementById('scanLabel').innerText = "Đang chờ: QUÉT TAG ID";
                } else if (currentStep === 'TAG') {
                    tempRow.tag = val; currentStep = 'ITEM';
                    document.getElementById('scanLabel').innerText = "Đang chờ: QUÉT MÃ HÀNG";
                } else if (currentStep === 'ITEM') {
                    tempRow.item = val; currentStep = 'QTY';
                    document.getElementById('scanLabel').innerText = "Đang chờ: NHẬP SỐ LƯỢNG";
                } else if (currentStep === 'QTY') {
                    tempRow.qty = val;
                    scannedData.push({ tag: tempRow.tag, item: tempRow.item, qty: tempRow.qty, loc: currentLoc, machine: 'PDA-01' });
                    tempRow = { tag: '', item: '', qty: '' };
                    currentStep = 'TAG';
                    document.getElementById('scanLabel').innerText = "Đang chờ: QUÉT TAG ID";
                }
                this.value = '';
            }
        });

        // LOGIC XUẤT KHO
        document.getElementById('exportInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const tagId = this.value.trim();
                if (!tagId) return;
                
                // Gửi yêu cầu XUẤT lên Google Script
                fetch(CLOUD_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: 'OUTBOUND', tag: tagId })
                }).then(() => {
                    alert('✅ Đã yêu cầu xuất Tag: ' + tagId);
                    this.value = '';
                });
            }
        });

        document.getElementById('btnSync').addEventListener('click', async () => {
            if (scannedData.length === 0) return alert('Chưa có dữ liệu!');
            const btn = document.getElementById('btnSync');
            btn.innerHTML = '⌛ Syncing...';
            try {
                await fetch(CLOUD_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: 'INBOUND', payload: scannedData })
                });
                alert('✅ ĐỒNG BỘ THÀNH CÔNG!');
                scannedData = [];
            } catch (e) { alert('Lỗi!'); }
            btn,innerHTML = 'Đồng bộ Cloud';
        });

        function askAI() {
            const cmd = document.getElementById('aiCmd').value.toLowerCase();
            if (cmd.includes('nhập')) switchPage('nhap');
            else if (cmd.includes('xuất')) switchPage('xuat');
            else if (cmd.includes('dashboard')) switchPage('dashboard');
            else alert('AI: Tôi đã ghi nhận yêu cầu, đang xử lý dữ liệu trong kho...');
            document.getElementById('aiCmd').value = '';
        }

        // Mock Dashboard
        function loadDashboardData() {
            new Chart(document.getElementById('mainChart'), {
                type: 'line',
                data: {
                    labels: ['T1', 'T2', 'T3', 'T4'],
                    datasets: [{ label: 'Tồn kho', data: [100, 150, 120, 180], borderColor: '#4f46e5', tension: 0.4 }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        window.onload = () => {
            switchPage('dashboard');
            // init charts...
        };
    </script>
</body>
</html>
