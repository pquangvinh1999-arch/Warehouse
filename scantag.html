<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHM PRO - VINH ENTERPRISE</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        .input-card { @apply bg-white p-4 rounded-xl border border-slate-200 shadow-sm transition-all; }
        .input-field { @apply w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-lg text-center font-bold outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-all; }
    </style>
</head>
<body>

<div id="app" class="max-w-md mx-auto min-h-screen flex flex-col p-3">
    <div class="bg-indigo-700 rounded-2xl p-5 text-white shadow-lg mb-4 relative overflow-hidden">
        <div class="relative z-10">
            <h1 class="text-lg font-bold">WHM PRO - NHẬP KHO</h1>
            <p class="text-[10px] opacity-70">BY VINH ENTERPRISE | {{ currentTime }}</p>
        </div>
        <div class="absolute right-5 top-5 text-right z-10">
            <p class="text-3xl font-black">{{ queue.length }}</p>
            <p class="text-[9px] uppercase font-bold text-indigo-200">Tags Chờ Đẩy</p>
        </div>
        <div class="absolute -bottom-4 -left-4 w-24 h-24 bg-white opacity-10 rounded-full"></div>
    </div>

    <div class="space-y-3 mb-4">
        <div class="input-card">
            <label class="text-[10px] font-bold text-slate-500 uppercase">1. Vị Trí (Bin)</label>
            <input v-model="form.loc" ref="locInput" @keyup.enter="$refs.tagInput.focus()"
                   class="input-field text-xl text-indigo-600" placeholder="Quét Bin...">
        </div>

        <div class="input-card">
            <label class="text-[10px] font-bold text-slate-500 uppercase">2. Mã Tag (Tag ID)</label>
            <input v-model="form.tag" ref="tagInput" @keyup.enter="$refs.skuInput.focus()"
                   class="input-field text-lg" placeholder="Quét Tag ID...">
        </div>

        <div class="grid grid-cols-2 gap-2">
            <div class="input-card">
                <label class="text-[10px] font-bold text-slate-500 uppercase">3. Mã Hàng</label>
                <input v-model="form.sku" ref="skuInput" @keyup.enter="$refs.qtyInput.focus()"
                       class="input-field" placeholder="Mã hàng">
            </div>
            <div class="input-card">
                <label class="text-[10px] font-bold text-slate-500 uppercase">4. Số Lượng</label>
                <input v-model.number="form.qty" ref="qtyInput" @keyup.enter="handleScan"
                       type="number" class="input-field" placeholder="Số lượng">
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 pt-2">
            <button @click="exportExcel" class="bg-white border border-slate-300 text-slate-700 py-3 rounded-xl font-bold active:scale-95 transition-all">
                📥 Xuất File
            </button>
            <button @click="syncCloud" :disabled="isSyncing || queue.length === 0" 
                    class="bg-indigo-600 text-white py-3 rounded-xl font-bold shadow-indigo-200 shadow-lg active:scale-95 transition-all disabled:opacity-50">
                {{ isSyncing ? '... ĐANG LƯU' : '🚀 ĐỒNG BỘ CLOUD' }}
            </button>
        </div>
    </div>

    <div class="flex-1 flex flex-col min-h-0">
        <div class="flex justify-between items-center mb-2 px-1">
            <h3 class="text-xs font-bold text-slate-600 uppercase">Hàng chờ (Mới nhất trên cùng)</h3>
            <button @click="clearAll" class="text-[10px] text-red-500 font-bold">LÀM MỚI</button>
        </div>
        
        <div class="overflow-y-auto flex-1 space-y-2 pb-5">
            <transition-group name="list">
                <div v-for="item in queueReversed" :key="item.id" 
                     class="bg-white p-3 rounded-xl border border-slate-200 flex justify-between items-center">
                    <div class="space-y-1">
                        <div class="flex items-center gap-2">
                            <span class="bg-indigo-100 text-indigo-700 text-[10px] px-2 py-0.5 rounded-full font-bold">{{ item.loc }}</span>
                            <span class="text-slate-400 text-[10px]">{{ item.time }}</span>
                        </div>
                        <p class="text-sm font-bold text-slate-800">{{ item.sku }} | SL: {{ item.qty }}</p>
                        <p class="text-[10px] text-slate-500 font-mono italic">Tag: {{ item.tag }}</p>
                    </div>
                    <button @click="deleteItem(item.id)" class="text-red-400 p-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                    </button>
                </div>
            </transition-group>
            <div v-if="queue.length === 0" class="text-center py-10 text-slate-400 text-xs italic">
                Chưa có dữ liệu. Hãy quét để bắt đầu.
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp, ref, onMounted, computed } = Vue;

    createApp({
        setup() {
            const queue = ref(JSON.parse(localStorage.getItem('Vinh_WHM_Data')) || []);
            const form = ref({ loc: '', tag: '', sku: '', qty: 1 });
            const isSyncing = ref(false);
            const currentTime = ref('');
            
            // Link Apps Script của anh
            const CLOUD_API = 'https://script.google.com/macros/s/AKfycbx_yiyQX_5sZzzjuYCewBJbolSwfD_wZK5qDetlbvN1bTrqoVNGU7Pm2SS-ZOl4lN0T9g/exec';

            const queueReversed = computed(() => [...queue.value].reverse());

            const updateTime = () => {
                const now = new Date();
                currentTime.value = now.toLocaleTimeString('vi-VN');
            };

            const handleScan = () => {
                if (!form.value.loc || !form.value.tag || !form.value.sku) {
                    alert("Vui lòng nhập đủ các trường!");
                    return;
                }

                queue.value.push({
                    id: Date.now(),
                    loc: form.value.loc.trim(),
                    tag: form.value.tag.trim(),
                    sku: form.value.sku.trim(),
                    qty: form.value.qty,
                    time: new Date().toLocaleString('vi-VN')
                });

                // Reset các trường nhưng GIỮ LẠI Vị trí (để quét tiếp trong ô đó)
                form.value.tag = '';
                form.value.sku = '';
                form.value.qty = 1;
                
                saveLocal();
                document.querySelector('input[placeholder="Quét Tag ID..."]').focus();
            };

            const syncCloud = async () => {
                isSyncing.value = true;
                try {
                    // Gửi dữ liệu khớp với cấu trúc anh cần trên Sheet
                    const payload = { data: queue.value };
                    await fetch(CLOUD_API, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify(payload)
                    });
                    alert("🚀 Đã đồng bộ lên Cloud thành công!");
                    queue.value = [];
                    saveLocal();
                } catch (e) {
                    alert("❌ Lỗi kết nối. Vui lòng kiểm tra mạng!");
                } finally {
                    isSyncing.value = false;
                }
            };

            const saveLocal = () => localStorage.setItem('Vinh_WHM_Data', JSON.stringify(queue.value));
            const deleteItem = (id) => { queue.value = queue.value.filter(i => i.id !== id); saveLocal(); };
            const clearAll = () => { if(confirm('Xóa hết hàng chờ?')) { queue.value = []; saveLocal(); }};
            const exportExcel = () => {
                const ws = XLSX.utils.json_to_sheet(queue.value);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Data");
                XLSX.writeFile(wb, `WHM_Export_${Date.now()}.xlsx`);
            };

            onMounted(() => {
                updateTime();
                setInterval(updateTime, 1000);
            });

            return { queue, form, queueReversed, isSyncing, currentTime, handleScan, syncCloud, deleteItem, clearAll, exportExcel };
        }
    }).mount('#app');
</script>
</body>
</html>
